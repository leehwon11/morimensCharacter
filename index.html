<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캐릭터 빌더</title>
<style>
  :root{
    --ui-bg:#faf9f6; --ui-panel:#ffffff; --ui-border:#e2ddd2; --ui-border-strong:#cfc8b8;
    --ui-ink:#26231d; --ui-ink-2:#5a5548; --ui-ink-3:#8b8575; --ui-accent:#a8402f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--ui-bg);color:var(--ui-ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}

  .app-row{display:flex; height:100vh;}

  .editor-pane{width:46%; min-width:360px; border-right:1px solid var(--ui-border);
    display:flex; flex-direction:column; background:var(--ui-panel);}
  .preview-pane{flex:1; display:flex; flex-direction:column; background:var(--ui-bg);}

  .pane-header{padding:0.9rem 1.25rem; border-bottom:1px solid var(--ui-border);
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;}
  .pane-header h2{font-size:0.95rem; margin:0; letter-spacing:0.02em;}
  .pane-body{flex:1; overflow-y:auto; padding:1.25rem;}

  .meta-fields{display:flex; flex-direction:column; gap:0.6rem; margin-bottom:1.5rem;
    padding-bottom:1.25rem; border-bottom:1px dashed var(--ui-border);}
  .field label{display:block; font-size:0.72rem; color:var(--ui-ink-3); margin-bottom:0.25rem; letter-spacing:0.03em;}
  .field input, .field textarea, .field select{width:100%; padding:0.5rem 0.6rem; border:1px solid var(--ui-border-strong);
    border-radius:4px; font-size:0.85rem; font-family:inherit; background:#fff; color:var(--ui-ink);}
  .field textarea{resize:vertical; min-height:2.2rem; line-height:1.5;}

  .section-block{margin-bottom:1.75rem; padding-bottom:1.5rem; border-bottom:1px dashed var(--ui-border);}
  .section-block:last-child{border-bottom:none;}
  .section-block-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem;}
  .section-block-head h3{font-size:0.85rem; margin:0; color:var(--ui-ink-2); letter-spacing:0.02em;}

  .block-card{border:1px solid var(--ui-border); border-radius:6px; padding:0.85rem 0.9rem;
    margin-bottom:0.9rem; background:#fffdf9; position:relative;}
  .block-card .block-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem;}
  .block-card .block-type{font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--ui-accent); font-weight:600;}
  .block-card .block-actions{display:flex; gap:0.3rem;}
  .block-card .block-actions button{border:none; background:none; cursor:pointer; color:var(--ui-ink-3);
    font-size:0.85rem; padding:0.15rem 0.35rem; border-radius:3px;}
  .block-card .block-actions button:hover{background:var(--ui-border); color:var(--ui-ink);}
  .block-card .field{margin-bottom:0.5rem;}
  .block-card .field:last-child{margin-bottom:0;}

  .inner-toggle{display:flex; align-items:center; gap:0.4rem; font-size:0.78rem; color:var(--ui-ink-2); margin-top:0.3rem;}

  .branch-box{border:1px solid var(--ui-border); border-radius:5px; padding:0.7rem; margin-top:0.6rem; background:#faf8f3;}
  .branch-box .branch-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;}
  .branch-box .branch-head strong{font-size:0.78rem; color:var(--ui-ink-2);}

  .line-item{display:flex; gap:0.4rem; align-items:flex-start; margin-bottom:0.4rem; padding:0.5rem; background:#fff; border:1px solid var(--ui-border); border-radius:4px;}
  .line-item .line-fields{flex:1; display:flex; gap:0.3rem;}

  .tiny-btn{border:1px solid var(--ui-border-strong); background:#fff; font-size:0.7rem; padding:0.25rem 0.5rem;
    border-radius:4px; cursor:pointer; color:var(--ui-ink-2);}
  .tiny-btn:hover{background:var(--ui-ink); color:#fff;}

  .empty-hint{color:var(--ui-ink-3); font-size:0.8rem; text-align:center; padding:1rem; border:1px dashed var(--ui-border); border-radius:6px;}

  #copyBtn{background:var(--ui-accent); color:#fff; border:none; padding:0.5rem 1rem; border-radius:5px;
    font-size:0.82rem; cursor:pointer; font-weight:600; letter-spacing:0.01em;}
  #copyBtn:hover{opacity:0.9;}
  #copyStatus{font-size:0.76rem; color:#3b7a4a; margin-left:0.6rem;}

  iframe{flex:1; width:100%; border:none; background:#fff;}
</style>
</head>
<body>

<div class="app-row">

  <div class="editor-pane">
    <div class="pane-header">
      <h2>✎ 캐릭터 편집</h2>
      <div style="display:flex; gap:0.4rem;">
        <button class="tiny-btn" onclick="triggerImport()">📥 가져오기</button>
        <button class="tiny-btn" onclick="exportJSON()">📤 내보내기</button>
      </div>
    </div>
    <div class="pane-body">

      <div class="meta-fields">
        <div class="field">
          <label>캐릭터 이름</label>
          <input type="text" id="meta-name" oninput="updateMeta('name', this.value)">
        </div>
        <div class="field">
          <label>영역</label>
          <select id="meta-realm" oninput="updateMeta('realm', this.value)" onchange="updateMeta('realm', this.value)">
            <option value="chaos">혼돈 (노랑)</option>
            <option value="abyss">심해 (파랑)</option>
            <option value="blood">혈육 (붉은)</option>
            <option value="hyper">초차원 (보라)</option>
          </select>
        </div>
        <div class="field">
          <label>초상화 이미지 URL (비워두면 이름 텍스트로 대체)</label>
          <input type="text" id="meta-portraitSrc" oninput="updateMeta('portraitSrc', this.value)">
        </div>
        <div class="field">
          <label>도장(스탬프) 문구 (비워두면 표시 안 함)</label>
          <input type="text" id="meta-stampText" oninput="updateMeta('stampText', this.value)">
        </div>
        <div class="field">
          <label>티저 문구</label>
          <textarea id="txt_teaser" oninput="updateMeta('teaser', this.value)"></textarea>
        </div>
      </div>

      <div class="section-block">
        <div class="section-block-head">
          <h3>정보표</h3>
          <button class="tiny-btn" onclick="addInfoRow()">+ 행 추가</button>
        </div>
        <div id="infoRowsList"></div>
      </div>

      <div class="section-block">
        <div class="section-block-head">
          <h3>음성 트랙</h3>
          <button class="tiny-btn" onclick="addVoiceTrack()">+ 트랙 추가</button>
        </div>
        <div id="voiceTracksList"></div>
      </div>

      <div class="section-block">
        <div class="section-block-head">
          <h3>상세 스토리 섹션 (아코디언)</h3>
          <button class="tiny-btn" onclick="addSection()">+ 섹션 추가</button>
        </div>
        <div id="sectionsList"></div>
      </div>

      <div class="section-block">
        <div class="section-block-head">
          <h3>스킬 (아코디언)</h3>
          <button class="tiny-btn" onclick="addSkill()">+ 스킬 추가</button>
        </div>
        <div id="skillsList"></div>
      </div>

      <div class="section-block">
        <div class="section-block-head">
          <h3>갤러리 이미지</h3>
          <button class="tiny-btn" onclick="addGalleryImage()">+ 이미지 추가</button>
        </div>
        <div id="galleryImagesList"></div>
      </div>

    </div>
  </div>

  <div class="preview-pane">
    <div class="pane-header">
      <h2>👁 실시간 미리보기</h2>
      <div>
        <button id="copyBtn" onclick="copyHTML()">📋 HTML 복사</button>
        <span id="copyStatus"></span>
      </div>
    </div>
    <iframe id="previewFrame"></iframe>
  </div>

</div>

<input type="file" id="importFileInput" accept=".json,application/json" style="display:none" onchange="importJSON(event)">

<script>
let meta = { name:'', realm:'chaos', portraitSrc:'', stampText:'', teaser:'' };
let infoRows = [];
let voiceTracks = [];
let sections = [];
let skills = [];
let galleryImages = [];
let uid = 1;
const newId = () => 'c' + (uid++);

function updateMeta(field, value){ meta[field] = value; renderPreview(); }

// ---------- Info rows ----------
function addInfoRow(){ infoRows.push({ id:newId(), label:'', value:'' }); renderEditor(); renderPreview(); }
function removeInfoRow(id){ infoRows = infoRows.filter(r => r.id !== id); renderEditor(); renderPreview(); }
function updateInfoRow(id, field, value){ const r = infoRows.find(r=>r.id===id); if(r){ r[field]=value; renderPreview(); } }
function moveInfoRow(id, dir){
  const i = infoRows.findIndex(r=>r.id===id); const j = i+dir;
  if(j<0 || j>=infoRows.length) return;
  [infoRows[i], infoRows[j]] = [infoRows[j], infoRows[i]];
  renderEditor(); renderPreview();
}

// ---------- Voice tracks ----------
function addVoiceTrack(){ voiceTracks.push({ id:newId(), situation:'', content:'', src:'' }); renderEditor(); renderPreview(); }
function removeVoiceTrack(id){ voiceTracks = voiceTracks.filter(t=>t.id!==id); renderEditor(); renderPreview(); }
function updateVoiceTrack(id, field, value){ const t = voiceTracks.find(t=>t.id===id); if(t){ t[field]=value; renderPreview(); } }

// ---------- Sections (accordion) ----------
function makeBlock(){
  return { id:newId(), type:'narration', text:'' };
}
function addSection(){ sections.push({ id:newId(), title:'', blocks:[ makeBlock() ] }); renderEditor(); renderPreview(); }
function removeSection(id){ sections = sections.filter(s=>s.id!==id); renderEditor(); renderPreview(); }
function updateSectionTitle(id, value){ const s = sections.find(s=>s.id===id); if(s){ s.title=value; renderPreview(); } }
function moveSection(id, dir){
  const i = sections.findIndex(s=>s.id===id); const j = i+dir;
  if(j<0 || j>=sections.length) return;
  [sections[i], sections[j]] = [sections[j], sections[i]];
  renderEditor(); renderPreview();
}

function addSectionBlock(sectionId){
  const s = sections.find(s=>s.id===sectionId);
  s.blocks.push(makeBlock());
  renderEditor(); renderPreview();
}
function removeSectionBlock(sectionId, blockId){
  const s = sections.find(s=>s.id===sectionId);
  s.blocks = s.blocks.filter(b=>b.id!==blockId);
  renderEditor(); renderPreview();
}
function updateSectionBlock(sectionId, blockId, field, value){
  const s = sections.find(s=>s.id===sectionId);
  const b = s.blocks.find(b=>b.id===blockId);
  if(b){ b[field]=value; renderPreview(); }
}
function moveSectionBlock(sectionId, blockId, dir){
  const s = sections.find(s=>s.id===sectionId);
  const i = s.blocks.findIndex(b=>b.id===blockId); const j = i+dir;
  if(j<0 || j>=s.blocks.length) return;
  [s.blocks[i], s.blocks[j]] = [s.blocks[j], s.blocks[i]];
  renderEditor(); renderPreview();
}

function addSkill(){ skills.push({ id:newId(), title:'', description:'' }); renderEditor(); renderPreview(); }
function removeSkill(id){ skills = skills.filter(s=>s.id!==id); renderEditor(); renderPreview(); }
function updateSkillTitle(id, value){ const s = skills.find(s=>s.id===id); if(s){ s.title=value; renderPreview(); } }
function updateSkillDescription(id, value){ const s = skills.find(s=>s.id===id); if(s){ s.description=value; renderPreview(); } }
function moveSkill(id, dir){
  const i = skills.findIndex(s=>s.id===id); const j = i+dir;
  if(j<0 || j>=skills.length) return;
  [skills[i], skills[j]] = [skills[j], skills[i]];
  renderEditor(); renderPreview();
}

function addGalleryImage(){ galleryImages.push({ id:newId(), thumbSrc:'', fullSrc:'', alt:'' }); renderEditor(); renderPreview(); }
function removeGalleryImage(id){ galleryImages = galleryImages.filter(g=>g.id!==id); renderEditor(); renderPreview(); }
function updateGalleryImage(id, field, value){ const g = galleryImages.find(g=>g.id===id); if(g){ g[field]=value; renderPreview(); } }

// ---------- esc / line breaks (no bold/color formatting needed for the character wiki) ----------
function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function nl2br(s){ return esc(s).replace(/\n/g,'<br>'); }

const REALM_OPTIONS = [
  { key:'chaos', label:'혼돈' },
  { key:'abyss', label:'심해' },
  { key:'blood', label:'혈육' },
  { key:'hyper', label:'초차원' },
];
function realmBadgeHTML(){
  const opt = REALM_OPTIONS.find(o => o.key === meta.realm) || REALM_OPTIONS[0];
  return `    <div class="char-realm-badge realm-${opt.key}">${esc(opt.label)}</div>`;
}

// ---------- Editor rendering ----------
function infoRowHTML(row){
  return `
    <div class="line-item">
      <div class="line-fields">
        <input type="text" value="${esc(row.label)}" oninput="updateInfoRow('${row.id}','label',this.value)" style="flex:0 0 35%; font-size:0.82rem; padding:0.35rem; border:1px solid var(--ui-border-strong); border-radius:4px;">
        <input type="text" value="${esc(row.value)}" oninput="updateInfoRow('${row.id}','value',this.value)" style="flex:1; font-size:0.82rem; padding:0.35rem; border:1px solid var(--ui-border-strong); border-radius:4px;">
      </div>
      <button class="tiny-btn" onclick="moveInfoRow('${row.id}',-1)">↑</button>
      <button class="tiny-btn" onclick="moveInfoRow('${row.id}',1)">↓</button>
      <button class="tiny-btn" onclick="removeInfoRow('${row.id}')">✕</button>
    </div>`;
}

function voiceTrackHTML(t){
  return `
    <div class="block-card">
      <div class="block-head">
        <span class="block-type">음성 트랙</span>
        <div class="block-actions">
          <button onclick="removeVoiceTrack('${t.id}')" title="삭제">✕</button>
        </div>
      </div>
      <div class="field">
        <label>상황</label>
        <input type="text" value="${esc(t.situation)}" oninput="updateVoiceTrack('${t.id}','situation',this.value)" placeholder="각성 / 명령-타격 / 명령-방어 / 광기 폭발">
      </div>
      <div class="field">
        <label>대사 내용</label>
        <textarea oninput="updateVoiceTrack('${t.id}','content',this.value)">${esc(t.content)}</textarea>
      </div>
      <div class="field">
        <label>음성 파일 링크 (src)</label>
        <input type="text" value="${esc(t.src)}" oninput="updateVoiceTrack('${t.id}','src',this.value)">
      </div>
    </div>`;
}

function sectionBlockCardHTML(sectionId, b){
  const taId = 'txt_' + sectionId + '_' + b.id;
  const body = `
      <div class="field">
        <label>나레이션 텍스트</label>
        <textarea id="${taId}" oninput="updateSectionBlock('${sectionId}','${b.id}','text',this.value)">${esc(b.text)}</textarea>
      </div>`;

  return `
    <div class="block-card">
      <div class="block-head">
        <span class="block-type">나레이션</span>
        <div class="block-actions">
          <button onclick="moveSectionBlock('${sectionId}','${b.id}',-1)" title="위로">↑</button>
          <button onclick="moveSectionBlock('${sectionId}','${b.id}',1)" title="아래로">↓</button>
          <button onclick="removeSectionBlock('${sectionId}','${b.id}')" title="삭제">✕</button>
        </div>
      </div>
      ${body}
    </div>`;
}

function skillCardHTML(sk, idx){
  return `
    <div class="branch-box">
      <div class="branch-head">
        <strong>스킬 ${idx+1}</strong>
        <div style="display:flex; gap:0.3rem;">
          <button class="tiny-btn" onclick="moveSkill('${sk.id}',-1)">↑</button>
          <button class="tiny-btn" onclick="moveSkill('${sk.id}',1)">↓</button>
          <button class="tiny-btn" onclick="removeSkill('${sk.id}')">삭제</button>
        </div>
      </div>
      <div class="field">
        <label>스킬 이름 (아코디언 제목)</label>
        <input type="text" value="${esc(sk.title)}" oninput="updateSkillTitle('${sk.id}',this.value)">
      </div>
      <div class="field">
        <label>스킬 설명</label>
        <textarea oninput="updateSkillDescription('${sk.id}',this.value)">${esc(sk.description)}</textarea>
      </div>
    </div>`;
}

function galleryImageHTML(g, idx){
  return `
    <div class="line-item">
      <div class="line-fields" style="flex-direction:column;">
        <input type="text" value="${esc(g.thumbSrc)}" oninput="updateGalleryImage('${g.id}','thumbSrc',this.value)" style="font-size:0.82rem; padding:0.35rem; border:1px solid var(--ui-border-strong); border-radius:4px;">
        <input type="text" value="${esc(g.fullSrc)}" oninput="updateGalleryImage('${g.id}','fullSrc',this.value)" style="font-size:0.82rem; padding:0.35rem; border:1px solid var(--ui-border-strong); border-radius:4px;">
        <input type="text" value="${esc(g.alt)}" oninput="updateGalleryImage('${g.id}','alt',this.value)" style="font-size:0.82rem; padding:0.35rem; border:1px solid var(--ui-border-strong); border-radius:4px;">
      </div>
      <button class="tiny-btn" onclick="removeGalleryImage('${g.id}')">✕</button>
    </div>`;
}

function sectionCardHTML(sec, idx){
  return `
    <div class="branch-box">
      <div class="branch-head">
        <strong>스토리 섹션 ${idx+1}</strong>
        <div style="display:flex; gap:0.3rem;">
          <button class="tiny-btn" onclick="moveSection('${sec.id}',-1)">↑</button>
          <button class="tiny-btn" onclick="moveSection('${sec.id}',1)">↓</button>
          <button class="tiny-btn" onclick="removeSection('${sec.id}')">섹션 삭제</button>
        </div>
      </div>
      <div class="field">
        <label>섹션 제목</label>
        <input type="text" value="${esc(sec.title)}" oninput="updateSectionTitle('${sec.id}',this.value)">
      </div>
      ${sec.blocks.map(b => sectionBlockCardHTML(sec.id, b)).join('')}
      <div style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.5rem;">
        <button class="tiny-btn" onclick="addSectionBlock('${sec.id}')">+ 나레이션</button>
      </div>
    </div>`;
}

function renderEditor(){
  document.getElementById('infoRowsList').innerHTML =
    infoRows.map(infoRowHTML).join('') || '<div class="empty-hint">위 버튼으로 정보표 행을 추가하세요.</div>';
  document.getElementById('voiceTracksList').innerHTML =
    voiceTracks.map(voiceTrackHTML).join('') || '<div class="empty-hint">위 버튼으로 음성 트랙을 추가하세요.</div>';
  document.getElementById('sectionsList').innerHTML =
    sections.map((s,i) => sectionCardHTML(s,i)).join('') || '<div class="empty-hint">위 버튼으로 스토리 섹션을 추가하세요.</div>';
  document.getElementById('skillsList').innerHTML =
    skills.map((sk,i) => skillCardHTML(sk,i)).join('') || '<div class="empty-hint">위 버튼으로 스킬을 추가하세요.</div>';
  document.getElementById('galleryImagesList').innerHTML =
    galleryImages.map(galleryImageHTML).join('') || '<div class="empty-hint">위 버튼으로 갤러리 이미지를 추가하세요.</div>';
}

// ---------- Character page HTML generation ----------
function portraitHTML(){
  const inner = meta.portraitSrc
    ? `<img src="${esc(meta.portraitSrc)}" alt="${esc(meta.name)}">`
    : esc(meta.name);
  const stamp = meta.stampText ? `\n    <span class="stamp">${esc(meta.stampText)}</span>` : '';
  return `  <div class="char-portrait">\n    ${inner}${stamp}\n  </div>`;
}

function infoRowsToHTML(){
  return infoRows.map(r => `      <tr><td>${esc(r.label)}</td><td>${esc(r.value)}</td></tr>`).join('\n');
}

const VOICE_TAG_STYLE = "display:inline-block;margin-right:0.6em;padding:0.1em 0.55em;border:1px solid currentColor;border-radius:3px;font-family:'Share Tech Mono','Courier New',monospace;font-size:0.7em;letter-spacing:0.06em;opacity:0.7;vertical-align:middle;white-space:nowrap;";

function voiceTrackInnerHTML(t){
  const tag = t.situation ? `<span style="${VOICE_TAG_STYLE}">${esc(t.situation)}</span>` : '';
  return `${tag}${esc(t.content)}`;
}

function voiceTracksToHTML(){
  if(voiceTracks.length === 0) return '';
  const tracks = voiceTracks.map(t => `      <div class="voice-track">
        <button data-src="${esc(t.src)}">▶</button>
        <span class="voice-label">${voiceTrackInnerHTML(t)}</span>
      </div>`).join('\n');
  return `    <div class="voice-player">
      <div class="voice-player-title">VOICE</div>
${tracks}
      <audio class="voice-audio-el"></audio>
    </div>

`;
}

function sectionBlockToHTML(b){
  return `          <p class="narration">${nl2br(b.text)}</p>`;
}

function sectionToHTML(sec, idx){
  const num = String(idx + 1).padStart(2, '0');
  const blocksHtml = sec.blocks.map(sectionBlockToHTML).join('\n');
  return `      <div class="accordion-item">
        <button class="accordion-header">
          <span class="accordion-index">${num}</span>
          <span class="accordion-title">${esc(sec.title)}</span>
          <span class="accordion-icon">+</span>
        </button>
        <div class="accordion-panel"><div class="accordion-panel-inner"><div class="accordion-panel-content">
${blocksHtml}
        </div></div></div>
      </div>`;
}

function skillsSectionHTML(){
  if(skills.length === 0) return '';
  const items = skills.map((sk, i) => {
    const num = String(i + 1).padStart(2, '0');
    return `      <div class="accordion-item">
        <button class="accordion-header">
          <span class="accordion-index">${num}</span>
          <span class="accordion-title">${esc(sk.title)}</span>
          <span class="accordion-icon">+</span>
        </button>
        <div class="accordion-panel"><div class="accordion-panel-inner"><div class="accordion-panel-content">
          <p class="skill-description">${nl2br(sk.description)}</p>
        </div></div></div>
      </div>`;
  }).join('\n');
  return `
    <div class="char-skill-section">
      <h3>스킬</h3>
${items}
    </div>
`;
}

function gallerySectionHTML(){
  if(galleryImages.length === 0) return '';
  const frames = galleryImages.map((g, i) => `    <button class="gallery-frame" data-full="${esc(g.fullSrc)}">
      <img src="${esc(g.thumbSrc)}" alt="${esc(g.alt || (meta.name + ' 이미지 ' + (i + 1)))}">
    </button>`).join('\n');
  return `
    <div class="char-gallery-section">
      <h3>갤러리</h3>
      <div class="char-gallery">
${frames}
      </div>
    </div>

    <!-- 모달: char-detail 바깥, </body> 바로 위에 딱 한 번만 넣으면 됨 -->
    <div class="gallery-modal" id="galleryModal">
      <button class="gallery-modal-close" aria-label="닫기">×</button>
      <img class="gallery-modal-img" alt="">
    </div>
`;
}

function buildCharacterHTML(){
  const sectionsHtml = sections.map((s, i) => sectionToHTML(s, i)).join('\n');
  return `<!DOCTYPE html>

const PREVIEW_SCRIPT = `
document.querySelectorAll('.accordion-header').forEach(function(h){
  h.addEventListener('click', function(){ h.closest('.accordion-item').classList.toggle('open'); });
});
var audioEl = document.querySelector('.voice-audio-el');
var buttons = document.querySelectorAll('.voice-track button');
if(audioEl){
  buttons.forEach(function(btn){
    btn.addEventListener('click', function(){
      var src = btn.dataset.src;
      var same = audioEl.src.endsWith(src);
      if(same && !audioEl.paused){ audioEl.pause(); btn.textContent = '▶'; }
      else{
        buttons.forEach(function(b){ b.textContent = '▶'; });
        audioEl.src = src;
        audioEl.play().catch(function(){});
        btn.textContent = '❚❚';
      }
    });
  });
  audioEl.addEventListener('ended', function(){ buttons.forEach(function(b){ b.textContent = '▶'; }); });
}

var modal = document.querySelector('#galleryModal');
if(modal){
  var modalImg = modal.querySelector('.gallery-modal-img');
  var closeBtn = modal.querySelector('.gallery-modal-close');
  function closeModal(){ modal.classList.remove('open'); modalImg.src = ''; }
  document.querySelectorAll('.gallery-frame').forEach(function(btn){
    btn.addEventListener('click', function(){
      modalImg.src = btn.dataset.full;
      var innerImg = btn.querySelector('img');
      modalImg.alt = innerImg ? innerImg.alt : '';
      modal.classList.add('open');
    });
  });
  if(closeBtn) closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', function(e){ if(e.target === modal) closeModal(); });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });
}
`;

function renderPreview(){
  const bodyHtml = buildCharacterHTML().replace(/^[\s\S]*?<body>/, '').replace(/<\/body>[\s\S]*$/, '');
  const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${PREVIEW_CSS}</style></head><body>${bodyHtml}<script>${PREVIEW_SCRIPT}<\/script></body></html>`;
  const frame = document.getElementById('previewFrame');
  let scrollY = 0;
  try{ scrollY = frame.contentWindow ? frame.contentWindow.scrollY : 0; }catch(e){}
  frame.onload = () => { try{ frame.contentWindow.scrollTo(0, scrollY); }catch(e){} };
  frame.srcdoc = doc;
}

function copyHTML(){
  const html = buildCharacterHTML();
  const status = document.getElementById('copyStatus');
  navigator.clipboard.writeText(html).then(() => {
    status.textContent = '복사됨!';
    setTimeout(() => status.textContent = '', 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = html;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    status.textContent = '복사됨!';
    setTimeout(() => status.textContent = '', 2000);
  });
}

// ---------- JSON 저장 / 불러오기 ----------
function exportJSON(){
  const data = JSON.stringify({ meta, infoRows, voiceTracks, sections, skills, galleryImages }, null, 2);
  const blob = new Blob([data], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const filename = (meta.name && meta.name.trim()) ? meta.name.trim() : '무제 캐릭터';
  const a = document.createElement('a');
  a.href = url;
  a.download = filename.replace(/[\\/:*?"<>|]/g, '_') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function triggerImport(){ document.getElementById('importFileInput').click(); }

function importJSON(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const data = JSON.parse(e.target.result);
      if(!data || typeof data !== 'object') throw new Error('invalid json');

      meta = Object.assign({ name:'', realm:'chaos', portraitSrc:'', stampText:'', teaser:'' }, data.meta || {});
      infoRows = Array.isArray(data.infoRows) ? data.infoRows : [];
      // 이전 버전 호환: label 필드만 있던 음성 트랙은 content로 이관
      voiceTracks = Array.isArray(data.voiceTracks) ? data.voiceTracks.map(t => ({
        id: t.id || newId(),
        situation: t.situation !== undefined ? t.situation : '',
        content: t.content !== undefined ? t.content : (t.label || ''),
        src: t.src || ''
      })) : [];
      sections = Array.isArray(data.sections) ? data.sections : [];
      skills = Array.isArray(data.skills) ? data.skills : [];
      galleryImages = Array.isArray(data.galleryImages) ? data.galleryImages : [];

      let maxNum = 0;
      const scan = (obj) => {
        if(obj && typeof obj === 'object'){
          if(typeof obj.id === 'string'){
            const m = obj.id.match(/^c(\d+)$/);
            if(m) maxNum = Math.max(maxNum, parseInt(m[1], 10));
          }
          Object.values(obj).forEach(v => {
            if(Array.isArray(v)) v.forEach(scan);
            else if(v && typeof v === 'object') scan(v);
          });
        }
      };
      infoRows.forEach(scan); voiceTracks.forEach(scan); sections.forEach(scan); skills.forEach(scan); galleryImages.forEach(scan);
      uid = maxNum + 1;

      document.getElementById('meta-name').value = meta.name || '';
      document.getElementById('meta-realm').value = meta.realm || 'chaos';
      document.getElementById('meta-portraitSrc').value = meta.portraitSrc || '';
      document.getElementById('meta-stampText').value = meta.stampText || '';
      document.getElementById('txt_teaser').value = meta.teaser || '';

      renderEditor();
      renderPreview();
    }catch(err){
      console.error('importJSON error:', err);
      alert('JSON 파일을 읽는 중 오류가 발생했습니다. 올바른 형식의 파일인지 확인해주세요.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}
